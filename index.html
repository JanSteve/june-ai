<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>June A.I.</title>
<meta name="description" content="June A.I. - Advanced Neural Assistant">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast"></div>

  <!-- Header -->
  <header id="top-header">
    <div class="brand">
      <div class="brand-orb" id="status-orb"></div>
      <div class="brand-text">June A.I.</div>
    </div>
    <div class="header-controls">
      <div id="voice-indicator" class="hidden">
        <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
      </div>
      <button id="settings-btn" title="Configuration">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      </button>
    </div>
  </header>

  <!-- Settings Panel Overlay -->
  <div id="settings-overlay" class="hidden"></div>
  <div id="settings-panel" class="hidden">
    <div class="settings-header">
      <h3>System Configuration</h3>
      <button id="close-settings">×</button>
    </div>
    
    <div class="settings-content">
      <div class="settings-group">
        <label>Engine</label>
        <select id="model-select">
          <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Primary)</option>
          <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
          <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
        </select>
      </div>

      <div class="settings-group">
        <label>Voice Model</label>
        <select id="voice-select">
          <option value="George (British)">George (British)</option>
          <option value="Daniel (British)">Daniel (British)</option>
          <option value="Callum (Refined)">Callum (Refined)</option>
          <option value="James (Authoritative)">James (Authoritative)</option>
        </select>
      </div>

      <div class="settings-group slider-group">
        <label>Speech Rate: <span id="rate-val">0.92</span>x</label>
        <input type="range" id="voice-speed" min="0.7" max="1.3" step="0.05" value="0.92">
      </div>
      
      <div class="settings-group slider-group">
        <label>Expressiveness: <span id="pitch-val">0.55</span></label>
        <input type="range" id="voice-pitch" min="0.2" max="0.9" step="0.05" value="0.55">
      </div>

      <div class="settings-group toggle-group">
        <label for="auto-speak">Auto-Speak Responses</label>
        <label class="switch">
          <input type="checkbox" id="auto-speak" checked>
          <span class="slider round"></span>
        </label>
      </div>
      
      <!-- Hidden elements that app.js expects but aren't needed in the new UI -->
      <div style="display:none;">
        <input type="password" id="api-key-input">
        <button id="save-key"></button>
        <span id="conn-status"></span>
        <div id="bar-cpu"></div><div id="val-cpu"></div>
        <div id="bar-mem"></div><div id="val-mem"></div>
        <div id="bar-net"></div><div id="val-net"></div>
        <div id="stat-queries"></div><div id="stat-tokens"></div>
        <div id="stat-voice"></div><div id="stat-uptime"></div>
        <div id="activity-log"></div><div id="rp-temp"></div>
        <div id="rp-power"></div><div id="rp-msgs"></div>
        <div id="rp-mode"></div><div id="mini-graph"></div>
        <div id="voice-status"></div><div id="speech-status"></div>
        <div id="state-text"></div><button id="clear-btn"></button>
      </div>
    </div>
  </div>

  <!-- Main Chat -->
  <main id="main-container">
    <div id="chat-area">
      <!-- JARVIS Welcome Message -->
      <div class="msg jarvis">
        <div class="avatar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        </div>
        <div class="msg-content">
          Good day, sir. The system has been fully modernized and is awaiting your command.
        </div>
      </div>
    </div>
  </main>

  <!-- Input Container -->
  <footer id="input-container">
    <div class="input-wrapper">
      <button id="mic-btn" title="Voice Input">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M19 10a7 7 0 0 1-14 0M12 19v3M8 22h8"/>
        </svg>
      </button>
      <textarea id="text-input" rows="1" placeholder="Ask June A.I..." autocomplete="off"></textarea>
      <button id="send-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="footer-text">
      June A.I. operates on the Groq Network. Responses may vary.
    </div>
  </footer>

<script src="voice-engine.js"></script>
<script src="app.js"></script>
</body>
</html>
