<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>June A.I. — Omni Chat</title>
<meta name="description" content="June A.I. - Advanced Neural Assistant designed and developed by Kallepalli Ram Adithya Pranav">

<!-- Tailwind CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

<!-- Marked.js for Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        'bg':          '#0a0a0b',
        'bg-alt':      '#111113',
        'surface':     '#18181b',
        'surface-hi':  '#222225',
        'surface-lo':  '#0f0f11',
        'border':      '#2a2a2e',
        'border-hi':   '#3a3a40',
        'text-main':   '#e8e8ed',
        'text-sec':    '#9898a6',
        'text-dim':    '#5e5e6e',
        'accent':      '#8b8cff',
        'accent-hi':   '#a5a6ff',
        'accent-dim':  '#6163d6',
        'cyan':        '#4cd7f6',
        'orange':      '#ffb783',
        'red':         '#ff6b6b',
        'green':       '#4ade80',
      },
      fontFamily: {
        'sans':  ['Inter', 'system-ui', 'sans-serif'],
        'mono':  ['JetBrains Mono', 'monospace'],
        'brand': ['Sora', 'sans-serif'],
      },
    }
  }
}
</script>

<link rel="stylesheet" href="style.css?v=4.0">
</head>

<body class="bg-bg text-text-main font-sans flex flex-col h-[100dvh] overflow-hidden antialiased">

<!-- ═══ TOAST ═══ -->
<div id="toast" class="toast">Toast</div>

<!-- ═══ HEADER ═══ -->
<header class="flex items-center justify-between px-4 sm:px-6 py-3 border-b border-border/50 bg-bg/90 backdrop-blur-xl z-50 flex-shrink-0">
  <div class="flex items-center gap-3">
    <div id="status-orb" class="orb orb-idle"></div>
    <div class="flex flex-col">
      <span class="font-brand text-lg sm:text-xl font-semibold tracking-tight text-text-main leading-none">June A.I.</span>
      <span class="font-mono text-[10px] sm:text-xs text-cyan tracking-[0.2em] mt-0.5 uppercase">Omni Chat</span>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <!-- Voice indicator bars -->
    <div id="voice-indicator" class="voice-bars hidden">
      <span></span><span></span><span></span><span></span>
    </div>
    <!-- Clear chat -->
    <button id="clear-btn" title="New Chat" class="header-btn">
      <span class="material-symbols-outlined text-[20px]">delete_sweep</span>
    </button>
    <!-- Settings -->
    <button id="settings-btn" title="Settings" class="header-btn">
      <span class="material-symbols-outlined text-[20px]">tune</span>
    </button>
  </div>
</header>

<!-- ═══ SETTINGS OVERLAY ═══ -->
<div id="settings-overlay" class="settings-overlay hidden"></div>
<div id="settings-panel" class="settings-panel hidden">
  <div class="flex items-center justify-between mb-5">
    <h3 class="font-brand text-base font-semibold text-text-main">Configuration</h3>
    <button id="close-settings" class="header-btn"><span class="material-symbols-outlined text-lg">close</span></button>
  </div>

  <div class="flex flex-col gap-5">
    <!-- Model -->
    <div class="setting-group">
      <label class="setting-label">LLM Engine</label>
      <select id="model-select" class="setting-select">
        <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Primary)</option>
        <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
        <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
      </select>
    </div>
    <!-- Voice -->
    <div class="setting-group">
      <label class="setting-label">Voice Model</label>
      <select id="voice-select" class="setting-select">
        <option value="George (British)">George (British)</option>
        <option value="Daniel (British)">Daniel (British)</option>
        <option value="Callum (Refined)">Callum (Refined)</option>
        <option value="James (Authoritative)">James (Authoritative)</option>
      </select>
    </div>
    <!-- Speed -->
    <div class="setting-group">
      <label class="setting-label flex justify-between">Speech Rate <span id="rate-val" class="text-accent">0.92x</span></label>
      <input type="range" id="voice-speed" min="0.7" max="1.3" step="0.05" value="0.92" class="setting-range">
    </div>
    <!-- Expressiveness -->
    <div class="setting-group">
      <label class="setting-label flex justify-between">Expressiveness <span id="pitch-val" class="text-accent">0.55</span></label>
      <input type="range" id="voice-pitch" min="0.2" max="0.9" step="0.05" value="0.55" class="setting-range">
    </div>
    <!-- Auto-speak -->
    <div class="flex items-center justify-between">
      <label for="auto-speak" class="text-sm text-text-main cursor-pointer">Auto-Speak Responses</label>
      <label class="toggle">
        <input type="checkbox" id="auto-speak" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
</div>

<!-- ═══ CHAT AREA ═══ -->
<main class="flex-1 overflow-hidden flex flex-col relative">
  <div id="chat-area" class="flex-1 overflow-y-auto scroll-smooth px-4 sm:px-6 py-6 pb-44 flex flex-col gap-5 max-w-3xl w-full mx-auto chat-scroll">
    <!-- Welcome message -->
    <div class="msg-row msg-bot msg-animate">
      <div class="bot-avatar"><span class="material-symbols-outlined text-sm">memory</span></div>
      <div class="msg-col">
        <span class="msg-name">June A.I.</span>
        <div class="msg-bubble bot-bubble">Good day. I'm <strong>June A.I.</strong>, designed and developed by <strong>Kallepalli Ram Adithya Pranav</strong>. How may I assist you?</div>
      </div>
    </div>
  </div>

  <!-- ═══ INPUT BAR ═══ -->
  <div class="input-dock">
    <div class="input-bar">
      <button id="mic-btn" title="Voice Input" class="input-icon-btn">
        <span class="material-symbols-outlined text-xl">mic</span>
      </button>
      <textarea id="text-input" rows="1" placeholder="Message June A.I..." class="input-field"></textarea>
      <button id="send-btn" title="Send" disabled class="send-btn">
        <span class="material-symbols-outlined text-lg">arrow_upward</span>
      </button>
    </div>
    <p class="text-center text-[11px] text-text-dim mt-2 font-mono tracking-wider">June A.I. designed and developed by Kallepalli Ram Adithya Pranav</p>
  </div>
</main>

<script src="voice-engine.js?v=4.0"></script>
<script src="app.js?v=4.0"></script>
</body>
</html>
