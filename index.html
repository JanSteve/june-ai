<!DOCTYPE html>

<head>

<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>

<meta name="description" content="June A.I. - Advanced Neural Assistant">

                    "tertiary-fixed": "#ffdcc5",
                    "surface-tint": "#c0c1ff",
                    "primary-fixed": "#e1e0ff",
                    "on-primary-fixed-variant": "#2f2ebe",
                    "on-tertiary-container": "#452000",
                    "on-secondary-fixed-variant": "#004e5c",
                    "primary": "#c0c1ff",
                    "tertiary-fixed-dim": "#ffb783",
                    "surface-container-low": "#1c1b1c",

                    "on-secondary": "#003640",
                    "surface-container-highest": "#353436",
                    "secondary": "#4cd7f6",
                    "surface-container-lowest": "#0e0e0f",
                    "secondary-fixed": "#acedff",
                    "tertiary": "#ffb783",
                    "on-tertiary": "#4f2500",
                    "on-primary": "#1000a9",
                    "surface-container": "#201f20",
                    "surface": "#131314",
                    "on-error": "#690005",
                    "on-surface": "#e5e2e3",
                    "inverse-surface": "#e5e2e3",

<link rel="stylesheet" href="style.css?v=3.3">
</head>
<body class="flex flex-col h-[100dvh] overflow-hidden font-body-md text-body-md bg-background text-on-background">

<!-- Toast Notification Container -->
<div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[100] transition-all duration-300"></div>

<!-- Top Navigation (Mobile Friendly) -->
<header id="top-header" class="bg-background/80 backdrop-blur-xl border-b border-outline-variant/20 shadow-[0_0_40px_rgba(73,75,214,0.1)] flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 w-full z-50 sticky top-0">
    <div class="flex items-center gap-3">
        <!-- Re-using a generated orb or image if needed, or pure CSS orb -->
        <div id="status-orb" class="w-8 h-8 rounded-full border border-primary/30 flex-shrink-0 shadow-[0_0_10px_rgba(95,90,254,0.2)] bg-surface-container-high transition-all duration-500"></div>
        <div class="flex flex-col">
            <span class="font-headline-lg-mobile text-headline-lg-mobile text-on-background leading-none">June A.I.</span>
            <span class="font-label-sm text-label-sm text-secondary tracking-widest mt-0.5">OMNI CHAT</span>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <div id="voice-indicator" class="hidden flex items-center gap-1">
            <div class="w-1 h-3 bg-primary rounded-full animate-pulse"></div>
            <div class="w-1 h-4 bg-primary rounded-full animate-pulse delay-75"></div>
            <div class="w-1 h-3 bg-primary rounded-full animate-pulse delay-150"></div>
        </div>
        <button id="settings-btn" title="Configuration" class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-surface-container transition-colors text-on-surface-variant hover:text-primary">
            <span class="material-symbols-outlined text-xl">settings</span>
        </button>
    </div>
</header>

<!-- Settings Panel Overlay -->
<div id="settings-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40"></div>
<div id="settings-panel" class="hidden fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[90%] max-w-md bg-surface border border-outline-variant/30 rounded-2xl shadow-2xl z-50 p-6 flex flex-col gap-6">
    <div class="flex justify-between items-center border-b border-outline-variant/20 pb-4">
        <h3 class="font-headline-md text-on-background">System Configuration</h3>
        <button id="close-settings" class="text-on-surface-variant hover:text-error transition-colors">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>
    
    <div class="flex flex-col gap-4 overflow-y-auto max-h-[60vh] custom-scrollbar pr-2">
        <div class="flex flex-col gap-2">
            <label class="font-label-sm text-secondary">Engine</label>
            <select id="model-select" class="bg-surface-container text-on-surface border border-outline-variant/30 rounded-lg p-2 focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Primary)</option>
                <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
                <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
            </select>
        </div>

        <div class="flex flex-col gap-2">
            <label class="font-label-sm text-secondary">Voice Model</label>
            <select id="voice-select" class="bg-surface-container text-on-surface border border-outline-variant/30 rounded-lg p-2 focus:border-primary focus:ring-1 focus:ring-primary outline-none">
                <option value="George (British)">George (British)</option>
                <option value="Daniel (British)">Daniel (British)</option>
                <option value="Callum (Refined)">Callum (Refined)</option>
                <option value="James (Authoritative)">James (Authoritative)</option>
            </select>
        </div>

        <div class="flex flex-col gap-2">
            <label class="font-label-sm text-secondary flex justify-between">Speech Rate <span id="rate-val" class="text-primary">0.92x</span></label>
            <input type="range" id="voice-speed" min="0.7" max="1.3" step="0.05" value="0.92" class="accent-primary">
        </div>
        
        <div class="flex flex-col gap-2">
            <label class="font-label-sm text-secondary flex justify-between">Expressiveness <span id="pitch-val" class="text-primary">0.55</span></label>
            <input type="range" id="voice-pitch" min="0.2" max="0.9" step="0.05" value="0.55" class="accent-primary">
        </div>

        <div class="flex items-center justify-between mt-2">
            <label for="auto-speak" class="font-label-md text-on-surface">Auto-Speak Responses</label>
            <input type="checkbox" id="auto-speak" checked class="w-5 h-5 accent-primary bg-surface-container border-outline-variant/30 rounded cursor-pointer">
        </div>
        
        <!-- Hidden elements that app.js expects -->
        <div style="display:none;">
            <input type="password" id="api-key-input">
            <button id="save-key"></button>
            <span id="conn-status"></span>
            <div id="bar-cpu"></div><div id="val-cpu"></div>
            <div id="bar-mem"></div><div id="val-mem"></div>
            <div id="bar-net"></div><div id="val-net"></div>
            <div id="stat-queries"></div><div id="stat-tokens"></div>
            <div id="stat-voice"></div><div id="stat-uptime"></div>
            <div id="activity-log"></div><div id="rp-temp"></div>
            <div id="rp-power"></div><div id="rp-msgs"></div>
            <div id="rp-mode"></div><div id="mini-graph"></div>
            <div id="voice-status"></div><div id="speech-status"></div>
            <div id="state-text"></div><button id="clear-btn"></button>
        </div>
    </div>
</div>

<div class="flex-1 flex overflow-hidden">
    <!-- Central Chat Stream -->
    <div class="flex-1 flex flex-col relative w-full">
        <main id="chat-area" class="flex-1 overflow-y-auto custom-scrollbar p-4 md:p-8 pb-40 flex flex-col gap-6 w-full max-w-4xl mx-auto">
            <!-- Welcome Message generated by JS or static -->
            <div class="flex justify-start w-full gap-3 mt-4">
                <div class="w-8 h-8 rounded-full border border-primary/30 flex-shrink-0 shadow-[0_0_10px_rgba(95,90,254,0.2)] bg-surface-container flex items-center justify-center">
                    <span class="material-symbols-outlined text-sm text-primary">memory</span>
                </div>
                <div class="flex flex-col gap-2 w-full max-w-[90%]">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="font-label-sm text-label-sm text-secondary">June A.I.</span>
                    </div>
                    <div class="glass-panel rounded-2xl rounded-tl-none p-4 flex flex-col gap-4 text-on-surface font-body-md">
                        Good day, sir. The system has been fully modernized to Omni Chat standards and is awaiting your command.
                    </div>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="absolute bottom-0 left-0 right-0 p-4 md:p-8 bg-gradient-to-t from-background via-background/95 to-transparent pt-12">
            <div class="max-w-4xl mx-auto relative">
                <div class="glass-panel rounded-[24px] p-2 flex items-end gap-2 border border-outline-variant/30 shadow-[0_8px_32px_rgba(0,0,0,0.5)] focus-within:border-primary/50 focus-within:shadow-[0_0_20px_rgba(192,193,255,0.15)] transition-all duration-300 bg-surface-container-low/80 backdrop-blur-xl">
                    <button id="mic-btn" title="Voice Input" class="w-10 h-10 mb-1 ml-1 rounded-full flex items-center justify-center hover:bg-surface-container transition-colors text-on-surface-variant hover:text-primary group flex-shrink-0">
                        <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">mic</span>
                    </button>
                    <textarea id="text-input" class="flex-1 bg-transparent border-none text-on-background placeholder:text-outline-variant focus:ring-0 font-body-md resize-none min-h-[24px] max-h-[120px] py-3 px-2 custom-scrollbar outline-none" placeholder="Message June A.I..." rows="1"></textarea>
                    <div class="flex items-center gap-2 pr-1 mb-1">
                        <button id="send-btn" disabled class="w-10 h-10 rounded-full bg-primary text-on-primary flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed hover:bg-primary-fixed hover:shadow-[0_0_15px_rgba(192,193,255,0.4)] transition-all duration-300 flex-shrink-0">
                            <span class="material-symbols-outlined text-xl">arrow_upward</span>
                        </button>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <span class="font-label-sm text-label-sm text-outline-variant/60">June A.I designed and developed by R JAN STEVE DANIEL</span>
                </div>
            </div>
        </footer>
    </div>
</div>

<script src="voice-engine.js?v=3.3"></script>
<script src="app.js?v=3.3"></script>
</body>
</html>
